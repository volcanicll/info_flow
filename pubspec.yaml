name: info_flow
description: "AI驱动的信息聚合App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 网络
  dio: ^5.8.0+1
  json_annotation: ^4.9.0
  html: ^0.15.4

  # 本地存储
  shared_preferences: ^2.5.3

  # 工具
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  logger: ^2.5.0
  freezed_annotation: ^2.4.4
  uuid: ^4.5.1
  xml: ^6.6.1
  webview_flutter: ^4.14.0
  flutter_spinkit: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.4
  freezed: ^2.5.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
