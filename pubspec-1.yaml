name: info_flow
description: "AI驱动的信息聚合App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_html: ^3.0.0-beta.2
  pull_down_button: ^0.10.1

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 网络
  dio: ^5.8.0+1
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # 本地存储
  shared_preferences: ^2.5.3
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.30

  # 工具
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  logger: ^2.5.0
  freezed_annotation: ^2.4.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  retrofit_generator: ^9.1.7
  json_serializable: ^6.9.4
  freezed: ^2.5.7
  drift_dev: ^2.25.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
